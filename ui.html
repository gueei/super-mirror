<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: light;
      --bg: #FFFFFF;
      --panel-bg: #FFFFFF;
      --border: #E6E6E6;
      --border-strong: #D4D4D4;
      --text-primary: #1E1E1E;
      --text-secondary: #6E6E6E;
      --text-tertiary: #9A9A9A;
      --hover: #F5F5F5;
      --active: #EBEBEB;
      --accent: #0D99FF;
      --accent-hover: #007BE5;
      --accent-bg: #E5F4FF;
      --divider: #F0F0F0;
      --success: #14AE5C;
      --warn: #F24822;
      --warning-bg: #FFF8E1;
      --warning-text: #8A6D00;
      --warning-border: #C9A900;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 11px;
      line-height: 1.4;
    }

    body {
      min-width: 300px;
      display: flex;
      min-height: 100vh;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    button, input { font: inherit; }

    .selection-strip {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: var(--hover);
      color: var(--text-secondary);
      border-bottom: 1px solid var(--divider);
    }

    .selection-strip.empty {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .selection-indicator {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--accent);
      flex: 0 0 auto;
    }

    .selection-strip.empty .selection-indicator {
      background: transparent;
      border: 1px dashed var(--warning-border);
    }

    .selection-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content {
      position: relative;
      padding: 10px;
      display: flex;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      gap: 10px;
    }

    .preview-card {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      overflow: hidden;
      flex: 1;
      min-height: 120px;
    }

    .preview-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,.96);
      background: rgba(30,30,30,.88);
      padding: 2px 6px;
      border-radius: 999px;
      max-width: 210px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .zoom-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      font-size: 9px;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 999px;
      pointer-events: none;
    }

    .preview-svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 120px;
      background: #fff;
    }

    .shape-base {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.3;
      stroke-dasharray: 2 2;
      stroke-linejoin: round;
    }

    .shape-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.3;
      stroke-dasharray: 2 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shape-reflection {
      fill: none;
      stroke: var(--warn);
      stroke-width: 1.3;
      stroke-dasharray: 2 2;
      stroke-linejoin: round;
    }

    .shape-reflection-line {
      fill: none;
      stroke: var(--warn);
      stroke-width: 1.3;
      stroke-dasharray: 2 2;
      stroke-linecap: round;
    }

    .axis-line {
      stroke: var(--accent);
      stroke-width: 1.2;
      stroke-dasharray: 3 3;
      stroke-linecap: round;
    }

    .axis-line-locked {
      stroke-width: 3;
      stroke-dasharray: 4 3;
    }

    .edge-hint {
      stroke: rgba(255,255,255,.98);
      stroke-width: 2;
      stroke-dasharray: 3 3;
      stroke-linecap: round;
    }

    .edge-bounds-hint {
      stroke: rgba(30,30,30,.18);
      stroke-width: 1;
      stroke-dasharray: 4 4;
      stroke-linecap: round;
    }

    .edge-bounds-hint.edge-hint-selected {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 3;
    }

    .edge-hit {
      stroke: transparent;
      stroke-width: 18;
      stroke-linecap: round;
      cursor: pointer;
    }

    .edge-highlight {
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      pointer-events: none;
    }

    .edge-hint-selected {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 3 3;
      stroke-linecap: round;
      pointer-events: none;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      margin: 0 -10px -10px;
      border-top: 1px solid var(--border);
      background: #FAFAFA;
    }

    .footer-caption {
      font-size: 10px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 15px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: #fff;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 9px;
      color: var(--text-secondary);
      padding: 0 4px;
    }

    .footer-actions {
      display: flex;
      gap: 6px;
      flex: 1;
      justify-content: flex-end;
    }

    .footer-btn {
      height: 28px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      padding: 0 10px;
      cursor: pointer;
      font-weight: 500;
    }

    .footer-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      flex: 1.2;
    }

    .footer-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .footer-btn:hover { background: var(--hover); }
    .footer-btn:disabled {
      opacity: .4;
      cursor: default;
    }

    .info-btn {
      margin-left: auto;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
    }

    .info-btn:hover {
      background: rgba(0,0,0,.06);
      color: var(--text-secondary);
    }

    .about-backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .about-panel {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      padding: 20px;
      width: 100%;
      max-width: 260px;
    }

    .about-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }

    .about-title {
      font-size: 14px;
      font-weight: 600;
    }

    .about-version {
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .about-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .about-links {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    .about-links a {
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .about-links a:hover {
      text-decoration: underline;
    }

    .about-support {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 0;
      border-top: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
    }

    .about-support-label {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .bmc-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 14px;
      border-radius: 5px;
      background: #FFDD00;
      color: #000000;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .bmc-btn:hover {
      background: #FFD000;
      text-decoration: none;
    }

    .bmc-btn svg {
      flex-shrink: 0;
    }

    .about-footer {
      text-align: center;
      font-size: 9px;
      color: var(--text-tertiary);
      margin-top: 12px;
    }

    .empty-state {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
      padding: 14px 6px 18px;
    }

    .empty-state h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }

    .empty-state p {
      margin: 0;
      color: var(--text-secondary);
      max-width: 220px;
    }

    .tip-chip {
      height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-secondary);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- UI_JS_PLACEHOLDER -->
</body>
</html>
